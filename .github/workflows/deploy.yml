name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAGES: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # SPA fallback: copy index.html -> 404.html so deep links work
      - name: SPA fallback (404.html)
        run: cp dist/index.html dist/404.html

      - name: Verify build output
        run: |
          echo "--- dist root ---"; ls dist
          echo "--- assets count ---"; ls dist/assets | wc -l
          test -f dist/assets/index-*.js && echo "JS bundle present" || echo "MISSING JS BUNDLE"

      # Deploy via git commit to gh-pages branch (reliable for static sites)
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
