name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAGES: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # SPA fallback: GitHub Pages has no server rewrite, so copy index.html
      # to 404.html. Deep links (/brotherhood/challenges) then load the app
      # shell and react-router renders the correct route.
      - name: SPA fallback (404.html)
        run: cp dist/index.html dist/404.html

      - name: Verify build output
        run: |
          echo "--- dist root ---"
          ls -la dist
          echo "--- dist/assets (count) ---"
          ls dist/assets | wc -l
          test -f dist/assets/index-*.js && echo "JS bundle present" || echo "MISSING JS BUNDLE"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist
          if-no-files-found: error

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
